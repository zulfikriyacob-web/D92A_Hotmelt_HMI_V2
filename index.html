function fDS(d){if(!d)return'';var dt=new Date(d+'T00:00:00');var m=['Jan','Feb','Mac','Apr','Mei','Jun','Jul','Ogo','Sep','Okt','Nov','Dis'];return dt.getDate()+' '+m[dt.getMonth()]}
function sC(s){return s==='Shift A'?'bg-emerald-500/15 text-emerald-400 border-emerald-500/30':s==='Shift B'?'bg-amber-500/15 text-amber-400 border-amber-500/30':'bg-sky-500/15 text-sky-400 border-sky-500/30'}
function cC(c){return c==='YES'?'bg-red-500/15 text-red-400 border-red-500/30':'bg-zinc-600/15 text-zinc-400 border-zinc-600/30'}
function toast(m,t){t=t||'success';var c=document.getElementById('tC'),el=document.createElement('div');var ic={success:'check-circle',error:'exclamation-circle',info:'info-circle'};el.className='toast t'+t[0];el.innerHTML='<i class="fas fa-'+(ic[t]||'info-circle')+' mr-2"></i>'+m;c.appendChild(el);setTimeout(function(){el.style.opacity='0';el.style.transition='opacity .3s';setTimeout(function(){el.remove()},300)},3200)}
function opM(id){var m=document.getElementById(id);m.classList.remove('hidden');m.classList.add('flex')}
function clM(id){var m=document.getElementById(id);m.classList.add('hidden');m.classList.remove('flex')}
function bL(bid,ld){var b=document.getElementById(bid);if(!b)return;if(ld){b._o=b.innerHTML;b.innerHTML='<i class="fas fa-spinner fa-spin mr-1.5"></i>Saving...';b.classList.add('bd')}else{b.innerHTML=b._o||b.innerHTML;b.classList.remove('bd')}}
function doSetup(){var url=document.getElementById('setupUrl').value.trim(),errEl=document.getElementById('setupErr');if(!url){errEl.textContent='Sila masukkan URL.';errEl.classList.remove('hidden');return}if(!url.startsWith('https://script.google.com')){errEl.textContent='URL mesti bermula dengan https://script.google.com';errEl.classList.remove('hidden');return}var btn=document.getElementById('setupBtn');btn.innerHTML='<i class="fas fa-spinner fa-spin mr-2"></i>Menyambung...';btn.classList.add('bd');errEl.classList.add('hidden');var testUrl=url+(url.indexOf('?')===-1?'?':'&')+'action=ping';fetch(testUrl).then(function(r){return r.json()}).then(function(data){if(data.status==='ok'){API_URL=url;localStorage.setItem('hm_api_url',url);loadApp()}else{throw new Error(data.error||'Respons tidak sah')}}).catch(function(e){btn.innerHTML='<i class="fas fa-plug mr-2"></i>SAMBUNG';btn.classList.remove('bd');errEl.textContent='Gagal sambung: '+e.message;errEl.classList.remove('hidden')})}
function disconnect(){if(!confirm('Putus sambungan?'))return;localStorage.removeItem('hm_api_url');API_URL='';location.reload()}
function swTab(n){['input','history','report'].forEach(function(t){document.getElementById('p-'+t).classList.toggle('hidden',t!==n);document.getElementById('tB'+t[0]).className=t===n?'tab-active px-4 py-4 text-[13px] font-600 tracking-wide transition-all':'tab-inactive px-4 py-4 text-[13px] font-600 tracking-wide transition-all'});if(n==='history')rHist();if(n==='report')rRpt()}

function upCal(){var wpp=S.weightPerPcs,pl=parseInt(document.getElementById('iPl').value)||0,ac=parseInt(document.getElementById('iAc').value)||0;document.getElementById('dW1').textContent=wpp;document.getElementById('dW2').textContent=wpp;var plW=pl*wpp,acW=ac*wpp;document.getElementById('dPW').textContent=fN(plW)+' g';document.getElementById('dPK').textContent=(plW/1000).toFixed(1)+' kg';document.getElementById('dAW').textContent=fN(acW)+' g';document.getElementById('dAK').textContent=(acW/1000).toFixed(1)+' kg';var evT=0;EK.forEach(function(k){var g=gC(k)*gEW(k);evT+=g;document.getElementById('cl-'+k).textContent=fN(g)+' g'});var bW=ac>0?acW:plW,tG=bW+evT;document.getElementById('dTG').textContent=fN(tG);document.getElementById('dTK').textContent=(tG/1000).toFixed(1);document.getElementById('dSP').textContent=fN(plW)+'g';document.getElementById('dSE').textContent=fN(evT)+'g';var aw=document.getElementById('dSAW');if(ac>0){aw.classList.remove('hidden');document.getElementById('dSA').textContent=fN(acW)+'g';document.getElementById('dSE2').textContent=fN(evT)+'g'}else{aw.classList.add('hidden')}}

function svLog(){var op=document.getElementById('iOp').value,dt=document.getElementById('iDt').value,tm=document.getElementById('iTm').value,sh=document.getElementById('iSh').value,co=document.getElementById('iCo').value,pl=parseInt(document.getElementById('iPl').value)||0,ap=parseInt(document.getElementById('iAc').value)||0;if(!op){toast('Sila pilih operator','error');return}if(!dt){toast('Sila pilih tarikh','error');return}if(pl<=0){toast('Plan mesti > 0','error');return}var ew={_wpp:S.weightPerPcs};EK.forEach(function(k){ew[k]=gEW(k)});var entry={date:dt,time:tm,operator:op,shift:sh,cover:co,plan:pl,actualPcs:ap,b:gC('b'),c:gC('c'),d:gC('d'),e:gC('e'),f:gC('f'),g:gC('g'),ew:ew};bL('bSv',true);apiPost('addLog',entry).then(function(r){bL('bSv',false);if(r.success){entry.id=r.id;LD.push(entry);nId=r.id+1;var c=calc(entry);toast('Disimpan! Total: '+fN(c.total)+'g ('+c.totalKg+' kg)','success');rstForm()}else{toast('Gagal: '+(r.error||'Unknown'),'error')}}).catch(function(e){bL('bSv',false);toast('Ralat: '+e.message,'error')})}

function opVM(id){cVId=id;var e=LD.find(function(x){return x.id===id});if(!e)return;var c=calc(e),ct=document.getElementById('mVC');var ps='';if(c.actualPcs>0){ps='<div class="grid grid-cols-2 gap-3 mb-4"><div class="bg-hm-surface rounded-lg p-3"><div class="text-[9px] text-hm-muted uppercase tracking-widest mb-1">Plan (pcs)</div><div class="font-mono font-700 text-sm">'+fN(e.plan)+'</div><div class="font-mono text-[10px] text-hm-green">'+fN(c.planW)+' g</div></div><div class="bg-hm-surface rounded-lg p-3 border border-hm-sky/20"><div class="text-[9px] text-hm-sky uppercase tracking-widest mb-1">Actual Running</div><div class="font-mono font-700 text-sm text-hm-sky">'+fN(c.actualPcs)+' pcs</div><div class="font-mono text-[10px] text-hm-sky">'+fN(c.actualW)+' g</div></div></div>'}else{ps='<div class="bg-hm-surface rounded-lg p-3 mb-4"><div class="text-[9px] text-hm-muted uppercase tracking-widest mb-1">Plan (pcs)</div><div class="font-mono font-700">'+fN(e.plan)+' pcs \u2192 <span class="text-hm-green">'+fN(c.planW)+' g</span></div></div>'}ct.innerHTML='<div class="flex items-center gap-3 mb-4"><div class="w-11 h-11 rounded-xl bg-hm-surface border border-hm-border flex items-center justify-center"><i class="fas fa-user text-hm-amber text-sm"></i></div><div><div class="font-display font-800 text-lg">'+e.operator+'</div><div class="text-[11px] text-hm-muted font-mono">'+fDD(e.date)+' \u00b7 '+(e.time||'--:--')+'</div></div></div><div class="flex gap-2 mb-4"><span class="text-[10px] font-600 px-2 py-0.5 rounded-lg border '+sC(e.shift)+'">'+e.shift+'</span><span class="text-[10px] font-600 px-2 py-0.5 rounded-lg border '+cC(e.cover)+'">C/O '+e.cover+'</span><span class="text-[10px] font-600 px-2 py-0.5 rounded-lg border bg-hm-surface border-hm-border text-hm-muted">'+c.wpp+'g/pcs</span></div>'+ps+'<div class="space-y-1.5 mb-4">'+EK.map(function(k){var w=(e.ew&&e.ew[k]!=null)?e.ew[k]:(S.events[k]||{}).weight||0;return'<div class="flex items-center justify-between bg-hm-surface rounded-lg px-3 py-2"><span class="text-[11px] text-hm-muted">'+k.toUpperCase()+' \u00b7 '+(S.events[k]||{}).name+'</span><span class="font-mono text-[11px] font-600">'+e[k]+' x '+w+'g = <span class="text-hm-amber">'+fN(c.ev[k])+' g</span></span></div>'}).join('')+'</div><div class="bg-hm-amber/10 border border-hm-amber/20 rounded-xl p-4 text-center"><div class="text-[9px] text-hm-amber uppercase tracking-widest font-600 mb-1">Total Hotmelt</div><div class="font-mono font-700 text-2xl text-hm-amber">'+fN(c.total)+' g</div><div class="font-mono text-sm text-hm-text">'+c.totalKg+' kg</div><div class="text-[10px] text-hm-muted mt-1">'+(c.actualPcs>0?'Actual '+fN(c.actualW)+'g + Events '+fN(c.evTotal)+'g':'Plan '+fN(c.planW)+'g + Events '+fN(c.evTotal)+'g')+'</div></div>';opM('mV')}
function vGtR(){clM('mV');swTab('report');setTimeout(function(){var r=document.querySelector('[data-rid="'+cVId+'"]');if(r){r.classList.add('hr');r.scrollIntoView({behavior:'smooth',block:'center'});setTimeout(function(){r.classList.remove('hr')},2500)}},350)}
function opEM(id){cEId=id;var e=LD.find(function(x){return x.id===id});if(!e)return;var ct=document.getElementById('mEC');ct.innerHTML='<div class="grid grid-cols-2 gap-3"><div><label class="text-[9px] text-hm-muted uppercase tracking-widest font-600 block mb-1">Date</label><input type="date" id="ed-dt" value="'+e.date+'" class="w-full bg-hm-surface border border-hm-border rounded-lg px-3 py-2 text-sm font-mono focus:outline-none focus:border-hm-amber/40"></div><div><label class="text-[9px] text-hm-muted uppercase tracking-widest font-600 block mb-1">Time</label><input type="time" id="ed-tm" value="'+(e.time||'')+'" class="w-full bg-hm-surface border border-hm-border rounded-lg px-3 py-2 text-sm font-mono focus:outline-none focus:border-hm-amber/40"></div><div><label class="text-[9px] text-hm-muted uppercase tracking-widest font-600 block mb-1">Operator</label><select id="ed-op" class="w-full bg-hm-surface border border-hm-border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-hm-amber/40">'+S.operators.map(function(o){return'<option '+(o===e.operator?'selected':'')+'>'+o+'</option>'}).join('')+'</select></div><div><label class="text-[9px] text-hm-muted uppercase tracking-widest font-600 block mb-1">Shift</label><select id="ed-sh" class="w-full bg-hm-surface border border-hm-border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-hm-amber/40">'+['Shift A','Shift B','Shift C'].map(function(s){return'<option '+(s===e.shift?'selected':'')+'>'+s+'</option>'}).join('')+'</select></div><div><label class="text-[9px] text-hm-muted uppercase tracking-widest font-600 block mb-1">Changeover</label><select id="ed-co" class="w-full bg-hm-surface border border-hm-border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-hm-amber/40"><option '+(e.cover==='NO'?'selected':'')+'>NO</option><option '+(e.cover==='YES'?'selected':'')+'>YES</option></select></div><div><label class="text-[9px] text-hm-muted uppercase tracking-widest font-600 block mb-1"> function svEd(){var e=LD.find(function(x){return x.id===cEId});if(!e)return;var pl=parseInt(document.getElementById('ed-pl').value)||0;if(pl<=0){toast('Plan mesti > 0','error');return}var ew={_wpp:(e.ew&&e.ew._wpp)||S.weightPerPcs};EK.forEach(function(k){ew[k]=Math.max(0,parseInt(document.getElementById('ed-ew-'+k).value)||0)});var entry={id:e.id,date:document.getElementById('ed-dt').value,time:document.getElementById('ed-tm').value,operator:document.getElementById('ed-op').value,shift:document.getElementById('ed-sh').value,cover:document.getElementById('ed-co').value,plan:pl,actualPcs:parseInt(document.getElementById('ed-ac').value)||0,b:Math.max(0,parseInt(document.getElementById('ed-b').value)||0),c:Math.max(0,parseInt(document.getElementById('ed-c').value)||0),d:Math.max(0,parseInt(document.getElementById('ed-d').value)||0),e:Math.max(0,parseInt(document.getElementById('ed-e').value)||0),f:Math.max(0,parseInt(document.getElementById('ed-f').value)||0),g:Math.max(0,parseInt(document.getElementById('ed-g').value)||0),ew:ew};bL('bSE',true);apiPost('updateLog',entry).then(function(r){bL('bSE',false);if(r.success){var idx=LD.findIndex(function(x){return x.id===cEId});if(idx!==-1)LD[idx]=entry;clM('mE');rHist();toast('Rekod '+entry.operator+' dikemaskini!','success')}else{toast('Gagal: '+(r.error||'Unknown'),'error')}}).catch(function(er){bL('bSE',false);toast('Ralat: '+er.message,'error')})}
